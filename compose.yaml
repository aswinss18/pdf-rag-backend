services:
  server:
    build:
      context: .
    ports:
      - 8000:8000
    environment:
      - REDIS_URL=redis://redis:6379
      - RQ_QUEUE_NAME=default
    volumes:
      - uploaded-data:/app/uploaded
      - cache-data:/app/cache
      - persistence-data:/app/persistence
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
    command: python worker.py
    environment:
      - REDIS_URL=redis://redis:6379
      - RQ_QUEUE_NAME=default
    volumes:
      - uploaded-data:/app/uploaded
      - cache-data:/app/cache
      - persistence-data:/app/persistence
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379 # Remove this in production (internal only)
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
  uploaded-data:
  cache-data:
  persistence-data:
